// 글로벌 휠 렌더 큐 — renderReport 끝에서 실행
window._wheelRenderQueue = window._wheelRenderQueue || [];
function queueWheelRender(wheelId, binary, symbol, name, partnerBinary, partnerName, accent){
  window._wheelRenderQueue.push({wheelId, binary, symbol, name, partnerBinary, partnerName, accent});
}
function flushWheelRenderQueue(){
  (window._wheelRenderQueue || []).forEach(q => {
    renderWheelPieces(q.wheelId, q.binary, q.symbol, q.name, q.partnerBinary, q.partnerName, q.accent);
  });
  window._wheelRenderQueue = [];
}

// 휠 조각 & 중앙 정보 렌더링 (초기 + 버튼 클릭 시 재호출)
function renderWheelPieces(wheelId, myBinary, mySymbol, myName, partnerBinary, partnerName, accent){
  const db = window.ichingDB;
  if(!db) return;

  // 모든 64괘 점수 계산 + 정렬
  const scored = Object.keys(db).map(key => ({
    binary: key,
    data: db[key],
    score: compat64Score(myBinary, key),
  })).sort((a, b) => b.score - a.score);

  const angleStep = 360 / 64;
  const partnerData = db[partnerBinary];
  const partnerScore = compat64Score(myBinary, partnerBinary);
  const partnerStatus = wheelStatus(partnerScore);
  const partnerPureName = partnerData ? partnerData.name.split(' (')[0].replace(/^\d+\.\s*/, '') : '';

  // 조각 렌더
  let piecesHtml = '';
  scored.forEach((item, i) => {
    const color = wheelGradient(item.score);
    const rotation = i * angleStep;
    const isPartner = item.binary === partnerBinary;
    const cls = isPartner ? 'piece partner-highlight' : 'piece';
    const pureName = item.data.name.split(' (')[0].replace(/^\d+\.\s*/, '');
    piecesHtml += `
      <div class="${cls}"
           style="transform: rotate(${rotation}deg); background: ${color};"
           onmouseover="showWheelInfo('${wheelId}', '${pureName}', '${item.data.symbol}', ${item.score}, ${isPartner})"></div>`;
  });

  // DOM 업데이트
  const piecesEl = document.getElementById(wheelId + '-pieces');
  const centerSymbol = document.getElementById(wheelId + '-center-symbol');
  const centerName = document.getElementById(wheelId + '-center-name');
  const infoEl = document.getElementById(wheelId + '-info');

  if(piecesEl) piecesEl.innerHTML = piecesHtml;
  if(centerSymbol) centerSymbol.innerText = mySymbol;
  if(centerName) centerName.innerText = myName;

  // 초기 info: 상대 괘 위치
  if(infoEl && partnerData){
    infoEl.innerHTML = `
      <div style="background:#fff;padding:12px 14px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.06);border-bottom:3px solid ${partnerStatus.color};">
        <div style="font-size:.72rem;color:${partnerStatus.color};font-weight:700;letter-spacing:2px;margin-bottom:4px;">
          ⭐ ${partnerName}의 위치
        </div>
        <div style="font-size:.95rem;color:var(--ink);font-weight:800;margin-bottom:4px;word-break:keep-all;">
          ${partnerData.symbol} ${partnerPureName}
        </div>
        <div style="font-size:.82rem;font-weight:700;color:${partnerStatus.color};">
          ${partnerStatus.icon} ${partnerStatus.label} · ${partnerScore}점
        </div>
      </div>`;
  }
}

// 경합괘 버튼 클릭 핸들러 — 중심 괘 전환
function switchWheelCore(btn){
  const wheelId = btn.dataset.wheelId;
  const binary = btn.dataset.binary;
  const symbol = btn.dataset.symbol;
  const name = btn.dataset.name;
  const partnerBinary = btn.dataset.partnerBinary;
  const accent = btn.dataset.accent;
  // wheel 이름에서 partnerName 복원은 복잡하므로 btn에서 data-partner-name 추가 필요 — 여기서는 대안으로 기존 info에서 복원
  // → 대신 switchWheel 내부에서는 partnerName 파라미터 없이도 동작하도록 rerender
  const partnerData = window.ichingDB[partnerBinary];
  const partnerName = btn.dataset.partnerName || '상대';

  // 버튼 활성화 토글
  const selector = document.getElementById(wheelId + '-selector');
  if(selector){
    selector.querySelectorAll('button').forEach(b => {
      b.classList.remove('active');
      b.style.background = '#fff';
      b.style.color = accent;
    });
    btn.classList.add('active');
    btn.style.background = accent;
    btn.style.color = '#fff';
  }

  // 휠 재렌더
  renderWheelPieces(wheelId, binary, symbol, name, partnerBinary, partnerName, accent);
}

// hover 시 정보 박스 업데이트 (전역 함수, onmouseover에서 호출)
function showWheelInfo(wheelId, name, symbol, score, isPartner){
  const infoBox = document.getElementById(wheelId + '-info');
  if(!infoBox) return;
  const status = wheelStatus(score);
  const badge = isPartner
    ? `<div style="font-size:.72rem;color:${status.color};font-weight:700;letter-spacing:2px;margin-bottom:4px;">⭐ 상대의 위치</div>`
    : '';
  infoBox.innerHTML = `
    <div style="background:#fff;padding:12px 14px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.06);border-bottom:3px solid ${status.color};">
      ${badge}
      <div style="font-size:.95rem;color:var(--ink);font-weight:800;margin-bottom:4px;word-break:keep-all;">
        ${symbol} ${name}
      </div>
      <div style="font-size:.82rem;font-weight:700;color:${status.color};">
        ${status.icon} ${status.label} · ${score}점
      </div>
    </div>`;
}

// 한 사람의 상괘(persona) + 하괘(essence) 겹친 레이더 (ver1 스타일)
function renderSoloRadar(canvasId, outerPcts, innerPcts, theme='navy'){
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  if(window['_chart_' + canvasId]) window['_chart_' + canvasId].destroy();

  const labels = ORDER.map(t => TRIGRAM[t].hanja);
  const outerData = ORDER.map(t => outerPcts[t]);
  const innerData = ORDER.map(t => innerPcts[t]);

  // ver1 방식 정규화: 편차에 따라 상한선 조정
  const normalize = (data) => {
    const values = [...data];
    const maxVal = Math.max(...values);
    const minVal = Math.min(...values);
    if(maxVal === 0) return values;
    const deviation = maxVal - minVal;
    let limit;
    if(deviation < 5) limit = 70;
    else if(deviation < 15) limit = 85;
    else limit = 95;
    return values.map(v => (v / maxVal) * limit);
  };

  const outerScaled = normalize(outerData);
  const innerScaled = normalize(innerData);

  // 테마별 색상
  // 나: 상괘=네이비 테두리, 하괘=보라 테두리 (채움은 반투명)
  // 상대: 상괘=버건디 테두리, 하괘=연보라 테두리
  const colors = theme === 'sky'
    ? { outerLine: '#8B2E3E', innerLine: '#B8A3D4', outerFill: 'rgba(139,46,62,.14)', innerFill: 'rgba(184,163,212,.22)' }
    : { outerLine: '#002D62', innerLine: '#6B4C9A', outerFill: 'rgba(0,45,98,.14)', innerFill: 'rgba(107,76,154,.18)' };

  window['_chart_' + canvasId] = new Chart(ctx, {
    type: 'radar',
    data: {
      labels,
      datasets: [
        {
          label: 'Persona (상괘)',
          data: outerScaled,
          borderColor: colors.outerLine,
          backgroundColor: colors.outerFill,
          borderWidth: 2.8,
          pointRadius: 2.5,
          pointBackgroundColor: colors.outerLine,
        },
        {
          label: 'Essence (하괘)',
          data: innerScaled,
          borderColor: colors.innerLine,
          backgroundColor: colors.innerFill,
          borderWidth: 2.8,
          pointRadius: 2.5,
          pointBackgroundColor: colors.innerLine,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 10, bottom: 10 } },
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 12, family: 'Pretendard' }, padding: 12 } },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const orig = ctx.datasetIndex === 0 ? outerData[ctx.dataIndex] : innerData[ctx.dataIndex];
              return `${ctx.dataset.label}: ${orig.toFixed(1)}%`;
            }
          }
        }
      },
      scales: {
        r: {
          min: 0, max: 100,
          ticks: { display: false, stepSize: 25 },
          grid: { color: 'rgba(0,0,0,.06)' },
          angleLines: { color: 'rgba(0,0,0,.1)' },
          pointLabels: { font: { size: 16, weight: 'bold', family: 'serif' }, color: '#333', padding: 8 }
        }
      }
    }
  });
}

window.OMST_Compat = {

  calcPct,

// ═══════════════════════════════════════════════════════════
// 7. 테스트 모드 (컨트롤 패널)
// ═══════════════════════════════════════════════════════════
function mockScores(dominantOuter, dominantInner){
  // 지배괘를 갖는 자연스러운 점수 분포 생성
  const outer = {}, inner = {};
  ORDER.forEach(t => {
    outer[t] = 10 + Math.random() * 15;  // 기본 노이즈
    inner[t] = 10 + Math.random() * 15;
  });
  // 지배괘 강화
  outer[dominantOuter] = 35 + Math.random() * 10;
  inner[dominantInner] = 35 + Math.random() * 10;
  // 인접 괘도 약간 강화 (현실성)
  const nearOuter = ORDER[(ORDER.indexOf(dominantOuter) + 1) % 8];
  const nearInner = ORDER[(ORDER.indexOf(dominantInner) + 1) % 8];
  outer[nearOuter] = 25 + Math.random() * 10;
  inner[nearInner] = 25 + Math.random() * 10;
  return { outer, inner };
}

function renderFromMock(){
  const meOuter = document.getElementById('me-outer').value;
  const meInner = document.getElementById('me-inner').value;
  const youOuter = document.getElementById('you-outer').value;
  const youInner = document.getElementById('you-inner').value;

  const me = { name: '나', scores: mockScores(meOuter, meInner) };
  const you = { name: '상대', scores: mockScores(youOuter, youInner) };

  renderReport(me, you);
}

function initSelectors(){
  const selects = ['me-outer','me-inner','you-outer','you-inner'];
  const defaults = {'me-outer':'건','me-inner':'감','you-outer':'곤','you-inner':'감'};
  selects.forEach(id => {
    const sel = document.getElementById(id);
    if(!sel) return;
    ORDER.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = `${t} (${TRIGRAM[t].hanja})`;
      if(t === defaults[id]) opt.selected = true;
      sel.appendChild(opt);
    });
  });
}

document.addEventListener('DOMContentLoaded', () => {
  initSelectors();
  renderFromMock();
});
</script>
