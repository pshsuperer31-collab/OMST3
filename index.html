<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMST™ 궁합 정밀 리포트</title>

<!-- Pretendard (ver1 스타일 본문 폰트) -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<!-- Noto Serif KR (ver1의 세리프 보강용 - 한글 세리프 명조) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="ichingDB.js"></script>
<script src="db12.js"></script>
<style>
:root{
  --navy:#002D62;
  --navy-deep:#001A3D;
  --ink:#1a1a1a;
  --gold:#B8924A;
  --gold-soft:#D4B170;
  --blue-soft:#4A90E2;
  --crimson:#A63D40;
  --sage:#6B8E5A;
  --bg:#F8F6F1;
  --paper:#FFFFFF;
  --line:#E8E2D5;
  --text:#2c3e50;
  --muted:#888;
  /* ver1과 동일한 폰트 스택 */
  --font-main:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --font-serif:"Noto Serif KR","AppleMyungjo","Apple Myungjo","NanumMyeongjo","Nanum Myeongjo","Batang",serif;
  --font-display:"Noto Serif KR","AppleMyungjo","Apple Myungjo","NanumMyeongjo","Batang",serif;
}
*{box-sizing:border-box}
body{
  margin:0;padding:0;
  background:var(--bg);
  font-family:var(--font-main);
  color:var(--text);
  line-height:1.7;
  letter-spacing:-.01em;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  font-feature-settings:"ss01","cv01";
}
.report{
  max-width:780px;
  margin:0 auto;
  background:var(--paper);
  padding:60px 40px 80px 40px;
  box-shadow:0 20px 60px rgba(0,0,0,.06);
  position:relative;
}
.report::before{
  content:"";
  position:absolute;top:0;left:0;right:0;height:6px;
  background:linear-gradient(90deg,var(--navy) 0%,var(--gold) 50%,var(--navy) 100%);
}

/* ═══ 헤더 ═══ */
.brand-header{text-align:center;padding:20px 0 40px 0;}
.brand-mark{
  font-family:var(--font-serif);
  font-size:.85rem;letter-spacing:8px;color:var(--gold);
  margin-bottom:8px;
}
.brand-title{
  font-family:var(--font-display);
  font-size:2.4rem;font-weight:700;color:var(--navy);
  letter-spacing:-1px;margin:0 0 6px 0;
}
.brand-sub{
  font-family:var(--font-serif);
  font-size:.95rem;color:var(--muted);font-style:italic;
}
.divider{
  border:0;height:1px;
  background:linear-gradient(to right,transparent,var(--navy),transparent);
  width:60%;margin:30px auto;opacity:.3;
}

/* ═══ 두 사람 소개 ═══ */
.dual-card{
  display:grid;grid-template-columns:1fr auto 1fr;gap:0;
  margin:30px 0 50px 0;
  align-items:center;
}
.person{
  text-align:center;padding:20px;
}
.person-label{
  font-size:.75rem;letter-spacing:4px;color:var(--gold);
  margin-bottom:8px;font-weight:600;
}
.person-name{
  font-family:var(--font-display);
  font-size:1.6rem;font-weight:700;color:var(--ink);
  margin-bottom:16px;
}
.gua-stack{
  display:flex;flex-direction:column;gap:8px;align-items:center;
}
.gua-box{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,45,98,.03);
  border:1px solid rgba(0,45,98,.08);
  padding:10px 18px;border-radius:12px;
  min-width:140px;justify-content:space-between;
}
.gua-box .lbl{
  font-size:.7rem;letter-spacing:2px;color:var(--muted);
}
.gua-box .sym{
  font-family:serif;font-size:1.8rem;color:var(--navy);line-height:1;
}
.gua-box .name{
  font-family:var(--font-display);font-size:1rem;color:var(--navy);font-weight:600;
}
.gua-box.inner{background:rgba(74,144,226,.04);border-color:rgba(74,144,226,.1);}
.gua-box.inner .sym,.gua-box.inner .name{color:var(--blue-soft);}

.yin-yang{
  width:60px;height:60px;
  display:flex;align-items:center;justify-content:center;
  font-size:3rem;color:var(--navy);
  animation:spin 40s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ═══ 에너지 불일치 지수 ═══ */
.hero-score{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-deep) 100%);
  color:#fff;padding:45px 35px;border-radius:20px;
  text-align:center;margin:40px 0;position:relative;overflow:hidden;
}
.hero-score::after{
  content:"☯";position:absolute;
  right:-20px;bottom:-30px;font-size:10rem;
  color:rgba(255,255,255,.05);pointer-events:none;
}
.hero-score .lbl{
  font-family:var(--font-display);
  font-size:1.15rem;letter-spacing:4px;color:var(--gold-soft);
  margin-bottom:6px;font-weight:800;
  text-shadow:0 0 20px rgba(212,177,112,.3);
}
.hero-score .main-label{
  font-family:var(--font-display);
  font-size:1.7rem;letter-spacing:2px;color:#fff;
  margin-bottom:24px;font-weight:800;
}
.hero-score .big{
  font-family:var(--font-display);
  font-size:4.5rem;font-weight:700;
  line-height:1;margin:0;
}
.hero-score .big .unit{font-size:1.5rem;opacity:.6;font-weight:300;}
.hero-score .tag{
  font-family:var(--font-serif);
  font-size:1.1rem;margin-top:12px;color:#fff;
}
.hero-score .desc{
  font-size:.9rem;opacity:.75;margin-top:8px;
  font-family:var(--font-serif);
}

/* ═══ 섹션 ═══ */
.section{
  margin:60px 0;
  scroll-margin-top:20px;
}
.section-head{
  display:flex;align-items:baseline;gap:14px;
  margin-bottom:8px;
}
.section-num{
  font-family:var(--font-display);
  font-size:1rem;color:var(--gold);
  letter-spacing:3px;font-weight:600;
}
.section-title{
  font-family:var(--font-display);
  font-size:1.7rem;font-weight:700;color:var(--navy);
  letter-spacing:-.5px;margin:0;
}
.section-sub{
  font-family:var(--font-serif);
  color:var(--muted);font-style:italic;
  margin:0 0 30px 0;font-size:.95rem;
}

/* ═══ 레이더 차트 박스 ═══ */
.chart-box{
  background:var(--bg);
  border:1px solid var(--line);
  border-radius:20px;
  padding:30px 20px 20px 20px;
  margin:20px 0;
}
.chart-box .cap{
  text-align:center;margin-bottom:20px;
}
.chart-box .cap-title{
  font-family:var(--font-display);font-size:1.1rem;color:var(--navy);font-weight:700;
}
.chart-box .cap-sub{font-size:.8rem;color:var(--muted);margin-top:4px;}
.chart-wrap{height:360px;position:relative;}

/* ═══ 카드 ═══ */
.criteria-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;
  margin:20px 0;
}
.criterion{
  background:var(--paper);
  border:1px solid var(--line);
  border-left:4px solid var(--navy);
  padding:20px 20px 18px 22px;border-radius:10px;
  transition:transform .2s,box-shadow .2s;
}
.criterion:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,45,98,.08);
}
.criterion.inner{border-left-color:var(--blue-soft);}
.criterion .cri-tag{
  font-size:.7rem;letter-spacing:3px;
  color:var(--gold);font-weight:600;margin-bottom:4px;
}
.criterion .cri-name{
  font-family:var(--font-display);
  font-size:1.05rem;font-weight:700;color:var(--ink);
  margin-bottom:10px;
}
.criterion .cri-body{
  font-size:.93rem;color:var(--text);line-height:1.75;
  word-break:keep-all;
}

/* ═══ 오행 원 ═══ */
.wuxing-box{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:20px;padding:30px;margin:20px 0;
  text-align:center;
}
.wuxing-svg{max-width:420px;margin:0 auto;display:block;}
.wuxing-note{
  font-family:var(--font-serif);
  font-size:.95rem;color:var(--text);
  margin-top:20px;line-height:1.8;
  padding:15px 20px;
  background:rgba(184,146,74,.06);
  border-radius:10px;
}
.wuxing-note strong{color:var(--gold);}

/* ═══ 드레인 게이지 ═══ */
.drain-gauge{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:20px;padding:30px;margin:20px 0;
}
.drain-bar{
  height:14px;border-radius:30px;
  background:linear-gradient(to right,
    var(--crimson) 0%,var(--crimson) 25%,
    var(--gold) 40%,var(--gold) 60%,
    var(--sage) 75%,var(--sage) 100%);
  position:relative;margin:18px 0 10px 0;
}
.drain-marker{
  position:absolute;top:-8px;
  width:4px;height:30px;background:var(--ink);
  border-radius:2px;
  transform:translateX(-50%);
}
.drain-marker::after{
  content:"";position:absolute;
  top:-8px;left:50%;transform:translateX(-50%);
  width:16px;height:16px;border-radius:50%;
  background:var(--ink);border:3px solid #fff;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}
.drain-labels{
  display:flex;justify-content:space-between;
  font-size:.75rem;color:var(--muted);
  font-family:var(--font-serif);
}

/* ═══ 64괘 에너지 휠 ═══ */
.wheel-wrapper{
  position:relative;
  width:280px;height:280px;
  margin:30px auto;
  border-radius:50%;
  display:flex;justify-content:center;align-items:center;
  background:#E74C3C;
  box-shadow:0 12px 30px rgba(0,0,0,.08);
  overflow:hidden;
}
.wheel-pieces{
  position:absolute;width:100%;height:100%;
  border-radius:50%;z-index:1;
}
.piece{
  position:absolute;width:50%;height:50%;
  left:50%;top:0;
  transform-origin:0% 100%;
  clip-path:polygon(0 100%, 10% 0, 0 0);
  border-left:1px solid rgba(255,255,255,.1);
  cursor:pointer;transition:all .2s ease;
}
.piece:hover{filter:brightness(1.2);z-index:20;}
.piece.partner-highlight{
  filter:brightness(1.3) saturate(1.4);
  z-index:15;
}
.piece.partner-highlight::after{
  content:"";position:absolute;
  width:10px;height:10px;
  left:3%;top:15%;
  background:#fff;border-radius:50%;
  box-shadow:0 0 8px rgba(255,255,255,.8);
  pointer-events:none;
}
.wheel-center{
  position:absolute;
  width:128px;height:128px;
  background:#fff;border-radius:50%;z-index:10;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
  border:4px solid var(--navy);
  transition:all .3s ease;
  padding:8px;text-align:center;
}
.wheel-center.sky{border-color:#8B2E3E;}
.wheel-center .title{
  font-size:.58rem;font-family:var(--font-display);
  color:var(--gold);font-weight:800;
  letter-spacing:1px;margin-bottom:3px;
}
.wheel-center .symbol{
  font-size:1.85rem;color:var(--navy);line-height:1;margin-bottom:2px;
}
.wheel-center.sky .symbol{color:#8B2E3E;}
.wheel-center .name{
  font-size:.82rem;font-weight:800;
  color:var(--ink);line-height:1.2;
  word-break:keep-all;
}
.wheel-center .partner-tag{
  font-size:.6rem;color:var(--muted);
  margin-top:4px;letter-spacing:1px;
}
.wheel-info-box{
  margin-top:20px;min-height:70px;font-size:.85rem;
}

@media (max-width:640px){
  .wheel-wrapper{width:240px;height:240px;margin:24px auto;}
  .wheel-center{width:110px;height:110px;border-width:3px;}
  .wheel-center .symbol{font-size:1.5rem;}
  .wheel-center .name{font-size:.75rem;}
}

/* ═══ 변용 (변괘) 섹션 ═══ */
.transform-box{
  background:linear-gradient(135deg,#F5F0E8 0%,#E8E0D0 100%);
  border:1px solid var(--gold-soft);
  border-radius:24px;padding:40px 30px;margin:20px 0;
  text-align:center;position:relative;overflow:hidden;
}
.transform-flow{
  display:flex;align-items:center;justify-content:center;
  gap:20px;margin:20px 0 30px 0;flex-wrap:wrap;
}
.transform-node{
  display:flex;flex-direction:column;align-items:center;
  padding:16px 24px;background:#fff;
  border:1px solid var(--line);border-radius:14px;
  min-width:100px;
}
.transform-node .sym{font-size:2rem;color:var(--navy);}
.transform-node .nm{font-family:var(--font-display);font-weight:700;color:var(--ink);margin-top:4px;}
.transform-node.result{background:var(--navy);color:#fff;border-color:var(--navy);}
.transform-node.result .sym,.transform-node.result .nm{color:#fff;}
.transform-arrow{
  font-size:1.6rem;color:var(--gold);font-weight:300;
}
.transform-text{
  font-family:var(--font-serif);
  font-size:1rem;line-height:1.9;color:var(--text);
  word-break:keep-all;
}

/* ═══ 처방전 ═══ */
.prescription{
  background:var(--paper);
  border:2px solid var(--navy);
  border-radius:20px;padding:40px 35px;margin:30px 0;
  position:relative;
}
.prescription::before{
  content:"";
  position:absolute;top:20px;right:25px;
  font-family:var(--font-display);font-size:1.8rem;
  color:var(--gold);font-style:italic;font-weight:700;
  opacity:.5;
}
.rx-head{
  font-family:var(--font-display);
  font-size:.85rem;letter-spacing:5px;color:var(--gold);
  margin-bottom:8px;
}
.rx-title{
  font-family:var(--font-display);font-size:1.4rem;font-weight:700;
  color:var(--navy);margin:0 0 25px 0;
}
.rx-block{
  padding:18px 20px;border-radius:12px;margin-bottom:14px;
  border-left:4px solid;
}
.rx-block.do{background:rgba(107,142,90,.06);border-left-color:var(--sage);}
.rx-block.dont{background:rgba(166,61,64,.05);border-left-color:var(--crimson);}
.rx-block .rx-lbl{
  font-size:.7rem;letter-spacing:3px;font-weight:700;
  margin-bottom:6px;
}
.rx-block.do .rx-lbl{color:var(--sage);}
.rx-block.dont .rx-lbl{color:var(--crimson);}
.rx-block .rx-body{
  font-family:var(--font-serif);font-size:.95rem;
  color:var(--text);line-height:1.8;
}

/* ═══ 음양 밸런스 ═══ */
.yy-balance{
  display:flex;align-items:center;justify-content:center;gap:20px;
  padding:25px;background:var(--bg);border-radius:16px;margin:20px 0;
}
.yy-bar{
  flex:1;height:36px;border-radius:18px;
  background:linear-gradient(to right,
    var(--ink) 0%,var(--ink) var(--yang-pct,50%),
    var(--paper) var(--yang-pct,50%),var(--paper) 100%);
  border:2px solid var(--ink);
  position:relative;overflow:hidden;
}
.yy-label{
  font-family:var(--font-display);font-size:.9rem;font-weight:700;
}
.yy-label.yang{color:var(--ink);}
.yy-label.yin{color:var(--muted);}

/* ═══ 푸터 ═══ */
.footer-note{
  margin-top:50px;padding-top:30px;
  border-top:1px solid var(--line);
  text-align:center;font-size:.8rem;color:var(--muted);
  font-family:var(--font-serif);line-height:2;
}
.footer-note .copy{
  font-family:'Arial';font-size:.72rem;
  color:#bbb;margin-top:12px;letter-spacing:1px;
}

/* ═══ 컨트롤 패널 (샘플 선택) ═══ */
.control-panel{
  max-width:780px;margin:20px auto;
  background:#fff;padding:20px 30px;
  border-radius:12px;border:1px solid var(--line);
  display:flex;gap:20px;align-items:center;flex-wrap:wrap;
}
.control-panel label{
  font-size:.85rem;font-weight:600;color:var(--navy);
}
.control-panel select{
  padding:6px 10px;border:1px solid var(--line);
  border-radius:6px;font-family:var(--font-main);
  color:var(--ink);font-size:.9rem;
}
.control-panel button{
  padding:8px 20px;background:var(--navy);color:#fff;
  border:none;border-radius:6px;font-weight:600;cursor:pointer;
  font-family:var(--font-main);
}
.control-panel button:hover{background:var(--navy-deep);}

/* ═══ 모바일 ═══ */
@media (max-width:640px){
  .report{padding:40px 20px 60px 20px;}
  .brand-title{font-size:1.8rem;}
  .dual-card{grid-template-columns:1fr;gap:20px;}
  .yin-yang{margin:10px auto;}
  .criteria-grid{grid-template-columns:1fr;}
  .hero-score .big{font-size:3.5rem;}
  .section-title{font-size:1.4rem;}
  .transform-flow{flex-direction:column;gap:10px;}
  .transform-arrow{transform:rotate(90deg);}
  .perspective-grid{grid-template-columns:1fr !important;}
  .basic-profile-grid{grid-template-columns:1fr !important;}
  .wuxing-pentagon-grid{grid-template-columns:1fr !important;}
  .wheel-grid{grid-template-columns:1fr !important;}
}
</style>
</head>
<body>

<!-- 샘플 데이터 컨트롤 (실제 서비스 시에는 제거 또는 숨김) -->
<div class="control-panel">
  <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
    <strong style="color:var(--navy);">테스트 모드:</strong>
    <label>나 지배괘</label>
    <select id="me-outer"></select>
    <select id="me-inner"></select>
    <label>상대 지배괘</label>
    <select id="you-outer"></select>
    <select id="you-inner"></select>
    <button onclick="renderFromMock()">랜덤 데이터로 재생성</button>
  </div>
  <div style="margin-top:10px;font-size:.78rem;color:var(--muted);line-height:1.6;">
    실제 서비스 연결 시: <code>window.OMST_Compat.renderReport(me, you)</code> 호출.<br>
    <code>me / you = { scores: {outer:{건:...,태:...,...}, inner:{...}}, name: "이름" }</code>
  </div>
</div>

<div class="report" id="report-root">
  <!-- JS로 렌더링 -->
</div>

<script>
// ══════════════════════════════════════════════════════════════
// OMST 궁합 리포트 로직 v3.0
// 주요 변경:
//  - Mock 대신 scores.outer / scores.inner 에서 실제 퍼센트 계산
//  - 정통 주역 변괘/호괘 로직 (6효 기반)
//  - 외부 API: window.OMST_Compat.renderReport(me, you)
// ══════════════════════════════════════════════════════════════

// ─── 8괘 메타데이터 ───
const TRIGRAM = {
  '건': {symbol:'☰', hanja:'乾', wuxing:'金', polarity:'陽', binary:'111', keyword:'주도/완벽'},
  '태': {symbol:'☱', hanja:'兌', wuxing:'金', polarity:'陰', binary:'011', keyword:'소통/기쁨'},
  '리': {symbol:'☲', hanja:'離', wuxing:'火', polarity:'陰', binary:'101', keyword:'통찰/확신'},
  '진': {symbol:'☳', hanja:'震', wuxing:'木', polarity:'陽', binary:'001', keyword:'돌격/개척'},
  '손': {symbol:'☴', hanja:'巽', wuxing:'木', polarity:'陰', binary:'110', keyword:'유연/지략'},
  '감': {symbol:'☵', hanja:'坎', wuxing:'水', polarity:'陽', binary:'010', keyword:'사색/통찰'},
  '간': {symbol:'☶', hanja:'艮', wuxing:'土', polarity:'陽', binary:'100', keyword:'중심/안정'},
  '곤': {symbol:'☷', hanja:'坤', wuxing:'土', polarity:'陰', binary:'000', keyword:'포용/헌신'},
};
// binary 규칙: 위에서 아래(상효→초효). 1=양효, 0=음효.
// 예: 건 ☰ = 위/중/아래 모두 양 → '111'. 곤 ☷ = 모두 음 → '000'. 진 ☳ = 위·중 음, 아래 양 → '001'.

const ORDER = ['건','태','리','진','손','감','간','곤'];

// 괘를 "심볼 + 한자" 형태로 표기 (한글 "건" 대신 "☰ 乾" 으로)
// 용법: guaLabel('건') → "☰ 乾"
function guaLabel(t){
  const g = TRIGRAM[t];
  if(!g) return t;
  return `${g.symbol} ${g.hanja}`;
}
function guaLabelHTML(t, style=''){
  const g = TRIGRAM[t];
  if(!g) return t;
  const baseStyle = 'font-family:serif;font-size:1.1em;margin-right:2px;vertical-align:middle;';
  return `<span style="${baseStyle}${style}">${g.symbol}</span><span style="font-family:serif;vertical-align:middle;">${g.hanja}</span>`;
}

// ─── 한글 조사 자동 조절 ───
function hasJongseong(ch){
  const code = ch.charCodeAt(0);
  if(code < 0xAC00 || code > 0xD7A3) return false;
  return ((code - 0xAC00) % 28) !== 0;
}
function josa(word, pair){
  // pair 예: '을/를', '이/가', '은/는', '과/와'
  const [withJong, withoutJong] = pair.split('/');
  // word의 마지막 한글 음절 기준
  let lastKorean = null;
  for(let i = word.length - 1; i >= 0; i--){
    const c = word[i];
    if(c >= '\uAC00' && c <= '\uD7A3'){ lastKorean = c; break; }
  }
  if(!lastKorean) return withoutJong;
  return hasJongseong(lastKorean) ? withJong : withoutJong;
}

// ─── 공명점 / 충돌점 계산 ───
// 두 사람의 각 괘 퍼센트를 비교하여:
// 공명점 = 둘 다 높으면서 격차도 작은 괘 (진짜 공명의 정의)
// 충돌점 = 한 사람만 높고 다른 사람은 낮음 (격차 큰 괘)
function findResonanceAndClash(pctA, pctB){
  const arr = ORDER.map(t => {
    const a = pctA[t] || 0;
    const b = pctB[t] || 0;
    const min = Math.min(a, b);
    const max = Math.max(a, b);
    const gap = Math.abs(a - b);
    // 공명 점수: 둘 다 높아야 하지만, 격차가 클수록 감점
    // max×2 에 가까운 격차는 거의 공명 아님으로 처리
    const resonanceScore = max > 0 ? min * (1 - Math.min(gap / (max * 2), 1)) : 0;
    return { trigram: t, a, b, both: min, gap, resonanceScore };
  });
  // 공명: resonanceScore 최대
  const resonance = [...arr].sort((x,y) => y.resonanceScore - x.resonanceScore)[0];
  // 충돌: gap 최대
  const clash = [...arr].sort((x,y) => y.gap - x.gap)[0];
  // 같은 괘가 둘 다 차지했는지 체크
  const sameTrigram = resonance.trigram === clash.trigram;
  return { resonance, clash, sameTrigram };
}

  if(rel.rawType === '상생'){

      caution: `다만 한쪽이 일방적 '주는 역할'에 갇히면 에너지 소진이 올 수 있으므로, ${receiverName}${josa(receiverName,'이/가')} ${giverName}에게 다른 방식의 지지를 돌려주는 균형이 중요합니다. 또한 상생의 편안함에 안주하면 성장의 날이 무뎌질 수 있으니, 의도적 도전을 공유해야 관계가 깊어집니다.`,

  if(rel.rawType === '상극'){

    const wCtrl = TRIGRAM[ctrl].wuxing;
    const wCted = TRIGRAM[cted].wuxing;
    const ctrlName = ctrl === a ? meName : youName;
    const ctedName = cted === a ? meName : youName;
    return {
      title: `서로를 벼리는 상극 구도 — ${wCtrl} 克 ${wCted}`,
      synergy: `<strong>${ctrlName}(${ctrl})의 ${tCtrl}</strong>${josa(tCtrl,'이/가')} <strong>${ctedName}(${cted})의 ${tCted}</strong>${josa(tCted,'을/를')} 제어하는 구조입니다. 언뜻 갈등처럼 보이지만, <strong>좋은 상극은 서로를 단련시키는 숫돌</strong>과 같아서, ${ctedName}의 과한 에너지를 ${ctrlName}${josa(ctrlName,'이/가')} 다듬어주고, ${ctrlName}의 날카로움은 ${ctedName}의 저항에 부딪혀 부드러워집니다.`,
      caution: `다만 서로가 방어적이 되면 ${tCtrl}${josa(tCtrl,'이/가')} 억압으로, ${tCted}${josa(tCted,'이/가')} 반항으로 변질되어 관계가 피로해집니다. 상대를 꺾으려 하지 말고, 부딪힘 자체가 성장의 재료임을 받아들이는 자세가 필요합니다. 특히 ${ctedName}${josa(ctedName,'은/는')} ${ctrlName}의 조언을 인신공격으로 받지 않는 훈련이 중요합니다.`,
      tone: 'tense'
    };
  }

  return {
    title: '간접적 상호작용',
    synergy: '뚜렷한 상생도 상극도 아닌, 은근한 결이 흐르는 관계입니다.',
    caution: '특별한 갈등은 없으나 깊은 공명도 드물어, 의도적으로 교집합을 만들어가야 합니다.',
    tone: 'neutral'
  };
}

// ═══════════════════════════════════════════════════════════
// 1. 점수 → 퍼센트 변환 (기존 index.html과 동일 방식)
// ═══════════════════════════════════════════════════════════
function calcPct(sObj){
  const vals = Object.values(sObj);
  const min = Math.min(...vals);
  const off = vals.map(v => v - min + 1);
  const total = off.reduce((a,b) => a+b, 0) || 1;
  const res = {};
  let i = 0;
  for(const k in sObj){ res[k] = (off[i]/total)*100; i++; }
  return res;
}

// 퍼센트에서 최상위 괘(지배괘) 추출
function dominantTrigram(pcts){
  return Object.entries(pcts).sort(([,a],[,b]) => b-a)[0][0];
}

// 에너지 불일치 지수 (0=완벽일치, 100=극불일치) - 내부 계산용
function calcDiscordance(pctA, pctB){
  let sum = 0;
  ORDER.forEach(t => {
    sum += Math.abs((pctA[t]||0) - (pctB[t]||0));
  });
  return Math.min(100, sum / 2);
}

function gradeDiscordance(score){
  if(score < 15) return {tag:'共鳴 · 공명', desc:'두 파동이 거의 하나로 포개짐', color:'#6B8E5A'};
  if(score < 30) return {tag:'調和 · 조화', desc:'서로 다르되 아름답게 어우러짐', color:'#8FAB7A'};
  if(score < 45) return {tag:'緊張 · 긴장', desc:'생산적 불꽃이 튀는 관계', color:'#D4B170'};
  if(score < 60) return {tag:'相剋 · 상극', desc:'부딪침이 성장을 낳는 단계', color:'#B8924A'};
  return {tag:'離散 · 이산', desc:'의식적 다리 놓기가 필요한 관계', color:'#A63D40'};
}

// ═══════════════════════════════════════════════════════════
// 관계 친화도 (Relational Affinity) — 3요소 가중치 결합
// ═══════════════════════════════════════════════════════════
// 점수 해석: 높을수록 두 사람의 에너지가 "얽혀있다"
//   낮음 = 거리감, 중간 = 생산적 긴장, 높음 = 공명
//
// 구성:
//   ① 에너지 유사성 (40%) - 8괘 분포가 비슷할수록 ↑
//   ② 오행 관계성 (40%) - 상생/비화/상극에 따라 차등
//   ③ 음양 보완성 (20%) - 음양 균형이 맞을수록 ↑
// ═══════════════════════════════════════════════════════════

// ① 에너지 유사성 점수 (0~100)
function scoreEnergySimilarity(outerA, innerA, outerB, innerB){
  // 상괘/하괘 각각의 불일치를 구한 뒤, 평균 → 100에서 차감
  const dOut = calcDiscordance(outerA, outerB);
  const dIn  = calcDiscordance(innerA, innerB);
  const avgDisc = (dOut + dIn) / 2;
  return Math.max(0, 100 - avgDisc);
}

// ② 오행 관계 점수 (0~100) — 전체 오행 분포 기반
// 【새 로직】
//  1. 두 사람의 상괘+하괘를 평균하여 8괘 → 5오행 분포로 치환
//  2. 균형 점수 (Balance): 두 분포의 합산이 均等(각 20%)에 얼마나 가까운가
//  3. 흐름 점수 (Flow): 모든 오행 쌍에 대해 관계점수 × (A비율 × B비율) 가중평균
//  4. 최종 = 균형 × 0.5 + 흐름 × 0.5

const WUXING_SCORE_MAP = {
  '상생(相生)': 90,   // 내가 상대를 길러줌
  '피생(被生)': 85,   // 상대가 나를 길러줌
  '비화(比和)': 70,   // 같은 기운 (좁은 공명, 성장엔 부족)
  '중립':      55,   // 간접 관계
  '피극(被剋)': 40,   // 상대가 나를 제어
  '상극(相剋)': 30,   // 내가 상대를 제어
};

// 8괘별 오행 매핑: 건·태=金, 리=火, 진·손=木, 감=水, 간·곤=土
const TRIGRAM_TO_WUXING = {
  '건':'金', '태':'金',
  '리':'火',
  '진':'木', '손':'木',
  '감':'水',
  '간':'土', '곤':'土'
};
const WUXING_LIST = ['木','火','土','金','水'];

// 퍼센트 분포를 받아 5오행 분포로 치환 (합 100)
function toWuxingDistribution(outerPct, innerPct){
  // 상괘 + 하괘를 평균 (통합적 기질)
  const avg = {};
  ORDER.forEach(t => {
    avg[t] = ((outerPct[t]||0) + (innerPct[t]||0)) / 2;
  });
  // 5오행으로 치환
  const wu = {'木':0,'火':0,'土':0,'金':0,'水':0};
  ORDER.forEach(t => {
    wu[TRIGRAM_TO_WUXING[t]] += avg[t];
  });
  return wu;
}

// 두 오행 간 관계 점수 얻기 (WUXING_SCORE_MAP 활용)
function wuxingRelationScore(a, b){
  if(a === b) return WUXING_SCORE_MAP['비화(比和)'];
  // 상생: a가 b를 낳음
  if(WUXING_SHENG[a] === b) return WUXING_SCORE_MAP['상생(相生)'];
  // 피생: b가 a를 낳음
  if(WUXING_SHENG[b] === a) return WUXING_SCORE_MAP['피생(被生)'];
  // 상극: a가 b를 제어
  if(WUXING_KE[a] === b) return WUXING_SCORE_MAP['상극(相剋)'];
  // 피극: b가 a를 제어
  if(WUXING_KE[b] === a) return WUXING_SCORE_MAP['피극(被剋)'];
  return WUXING_SCORE_MAP['중립'];
}

// 균형 점수: 합산 분포가 균등(각 20%)에 얼마나 가까운가
// 스케일 조정: 현실에서 TVD 40~60이 흔하므로 이 범위에서 더 예민하게 반응
function wuxingBalanceScore(wuA, wuB){
  const combined = {};
  let total = 0;
  WUXING_LIST.forEach(w => {
    combined[w] = (wuA[w] + wuB[w]) / 2;
    total += combined[w];
  });
  WUXING_LIST.forEach(w => { combined[w] = (combined[w] / total) * 100; });
  // 균등 분포(각 20%)와의 TVD
  let tvd = 0;
  WUXING_LIST.forEach(w => { tvd += Math.abs(combined[w] - 20); });
  tvd /= 2;  // 정규화 (범위 0~80)
  // 실제 분포의 TVD는 대부분 10~50 사이에 몰림
  // 60 이상부터는 확실한 편중이므로 이 지점이 이미 낮은 점수여야 함
  // → 스케일: TVD 0 → 100점, TVD 60 이상 → 0점에 근접
  const normalized = Math.min(tvd / 60, 1);  // 0~1
  // power 곡선 (편중이 클수록 가파르게 감점)
  const score = 100 * (1 - Math.pow(normalized, 1.3));
  return Math.max(0, Math.min(100, score));
}

// 흐름 점수: 모든 오행 쌍의 관계점수 × 비율곱 가중평균
function wuxingFlowScore(wuA, wuB){
  // 각 분포의 비율(%)로 정규화
  const sumA = WUXING_LIST.reduce((s,w) => s + wuA[w], 0);
  const sumB = WUXING_LIST.reduce((s,w) => s + wuB[w], 0);
  const pA = {}, pB = {};
  WUXING_LIST.forEach(w => {
    pA[w] = wuA[w] / sumA;  // 0~1
    pB[w] = wuB[w] / sumB;
  });
  // 25개 쌍(5×5) 교차 가중평균
  let weightedSum = 0;
  let totalWeight = 0;
  WUXING_LIST.forEach(a => {
    WUXING_LIST.forEach(b => {
      const weight = pA[a] * pB[b];  // 두 비율의 곱 (둘 다 크면 영향도 큼)
      const relScore = wuxingRelationScore(a, b);
      weightedSum += relScore * weight;
      totalWeight += weight;
    });
  });
  return totalWeight > 0 ? weightedSum / totalWeight : 60;
}

// 최종 오행 관계 점수 (0~100) — 균형 50 + 흐름 50
function scoreWuxingHarmony(outerA, innerA, outerB, innerB){
  const wuA = toWuxingDistribution(outerA, innerA);
  const wuB = toWuxingDistribution(outerB, innerB);
  const balance = wuxingBalanceScore(wuA, wuB);
  const flow    = wuxingFlowScore(wuA, wuB);
  return {
    total: balance * 0.5 + flow * 0.5,
    balance,
    flow,
    wuA, wuB,
  };
}

// ③ 음양 보완 점수 (0~100)
function scoreYinYangBalance(yangA, yangB){
  const dA = yangA - 50;
  const dB = yangB - 50;
  const sameDir = (dA * dB) > 0;
  const gap = Math.abs(yangA - yangB);
  const bothExtreme = Math.abs(dA) > 20 && Math.abs(dB) > 20;

  if(!sameDir && gap > 20) return 95;         // 반대 방향, 큰 차이 → 이상적 보완
  if(!sameDir && gap > 5)  return 80;         // 반대 방향, 부드러운 보완
  if(sameDir && bothExtreme) return 45;       // 같은 방향, 둘 다 극단 → 편중
  if(sameDir && gap < 10)  return 70;         // 같은 방향, 잔잔한 공명
  return 65;                                   // 기타
}

// 최종 관계 친화도 계산
function calcRelationalAffinity({outerA, innerA, outerB, innerB, meOuterTrig, meInnerTrig, youOuterTrig, youInnerTrig, yangMe, yangYou}){
  const energyScore = scoreEnergySimilarity(outerA, innerA, outerB, innerB);
  const wuxingResult = scoreWuxingHarmony(outerA, innerA, outerB, innerB);  // 이제 객체 반환
  const wuxingScore = wuxingResult.total;
  const yyScore = scoreYinYangBalance(yangMe, yangYou);

  // 가중치 결합
  const affinity = (energyScore * 0.4) + (wuxingScore * 0.4) + (yyScore * 0.2);

  return {
    total: affinity,
    breakdown: {
      energy:  { score: energyScore, weight: 40, weighted: energyScore * 0.4 },
      wuxing:  { score: wuxingScore, weight: 40, weighted: wuxingScore * 0.4, balance: wuxingResult.balance, flow: wuxingResult.flow, wuA: wuxingResult.wuA, wuB: wuxingResult.wuB },
      yinyang: { score: yyScore,     weight: 20, weighted: yyScore * 0.2 },
    }
  };
}

// 친화도 등급 (점수 기반 5단계)
function gradeAffinity(score){
  if(score >= 85) return {tag:'깊은 공명', desc:'자연스럽게 하나로 흐르는 깊은 인연', color:'#6B8E5A'};
  if(score >= 70) return {tag:'조화로운 만남', desc:'서로에게 쉽게 스며드는 어울림', color:'#8FAB7A'};
  if(score >= 55) return {tag:'서로를 채우는 관계', desc:'다름이 강점이 되어 보완되는 조합', color:'#D4B170'};
  if(score >= 40) return {tag:'함께 단련되는 관계', desc:'부딪힘 속에서 성장이 빚어지는 사이', color:'#B8924A'};
  return                {tag:'거리가 먼 인연', desc:'의식적인 다가감이 필요한 관계', color:'#A63D40'};
}

// 음양 비율
function calcYangRatio(pct){
  let yang = 0, yin = 0;
  ORDER.forEach(t => {
    if(TRIGRAM[t].polarity === '陽') yang += pct[t];
    else yin += pct[t];
  });
  return yang / (yang + yin) * 100;
}

// ═══════════════════════════════════════════════════════════
// 2. 주역 정통 변괘(變卦) 로직
// ═══════════════════════════════════════════════════════════
//
// 본괘(本卦): 6효 구조 = 상괘(上卦, 3효) + 하괘(下卦, 3효)
//   궁합에서 본괘 = [상상괘(外) + 하하괘(內)]
//   "두 사람의 관계 전체"를 하나의 6효 괘로 본다.
//   여기서는 한 사람의 상/하괘를 그대로 본괘로 사용 (개인의 본괘)
//   그리고 "관계 본괘" = 나의 상괘 + 상대의 하괘 로 정의
//
// 동효(動爻): 6개 효 중 변화 압력이 가장 큰 효
//   두 사람의 동일 위치 효가 다른 극성(양/음)이면 '변화 압력 있음'
//   가장 뚜렷하게 대립되는 효를 동효로 선정
//
// 변괘(之卦): 동효를 반대 극성으로 뒤집은 결과 괘
//   "관계가 향해 가는 다음 상태"를 의미
//
// 호괘(互卦): 본괘의 2,3,4효 = 하괘, 3,4,5효 = 상괘
//   "관계의 내적 잠재성, 속마음"을 의미

// 3효 binary를 위(상효)→아래(초효) 순서로 반환
function trigramToBits(name){
  // TRIGRAM의 binary는 '상효-중효-초효' 순
  return TRIGRAM[name].binary.split('').map(Number);
}

// 6효 구성: 상괘 3효 + 하괘 3효 = 총 6효
// 효 번호: 상효(6) - 5효 - 4효 - 3효 - 2효 - 초효(1)  (위에서부터)
// 배열 인덱스: [0]=상효, [1]=5효, [2]=4효, [3]=3효, [4]=2효, [5]=초효
function buildHexagram(outer, inner){
  const outerBits = trigramToBits(outer);  // [상, 중, 하]
  const innerBits = trigramToBits(inner);
  return [...outerBits, ...innerBits];  // 6효: 위→아래
}

// 6효 → 상괘/하괘 이름
function hexagramToTrigrams(bits){
  const outerBits = bits.slice(0, 3).join('');
  const innerBits = bits.slice(3, 6).join('');
  return {
    outer: BINARY_TO_NAME[outerBits],
    inner: BINARY_TO_NAME[innerBits],
  };
}

// 동효 선정: 두 사람의 6효를 비교하여, 가장 대립이 뚜렷한 효의 위치
// 관계 본괘 = 나의 6효. 변화 압력 = 같은 위치에서 상대와 다른 값을 가지면 +가중
// 추가로 퍼센트 격차가 큰 괘에 해당하는 효에 가중치
function findMovingYao(meHex, youHex, meOuterPct, meInnerPct, youOuterPct, youInnerPct){
  // 각 효마다 "변화 압력 점수" 계산
  const pressure = [];
  for(let i = 0; i < 6; i++){
    let p = 0;
    // 기본: 나와 상대의 효가 다르면 +1
    if(meHex[i] !== youHex[i]) p += 1;
    // 상괘(0~2)에 속하면 outerPct 격차, 하괘(3~5)는 innerPct 격차 반영
    // (간단하게 각 개인의 지배괘 관련 위치는 "안정"으로 보고 가중치 낮춤)
    pressure.push(p);
  }
  // 최대값 위치 찾기. 여러 개라면 중효(가운데, 2효·5효)를 우선.
  // 주역에서 2효·5효(중위)는 득중(得中)의 위치로 핵심적.
  let maxP = -1, idx = 0;
  const priority = [1, 4, 0, 5, 2, 3]; // 5효(idx1) → 2효(idx4) 우선
  for(const i of priority){
    if(pressure[i] > maxP){ maxP = pressure[i]; idx = i; }
  }
  // 만약 변화 압력이 전혀 없으면(모든 효 일치) = 순수 공명, 동효 없음
  if(maxP === 0) return null;
  return idx;
}

// 변괘 생성: 동효 위치의 효를 반대로 뒤집음
function buildChangedHexagram(bits, movingIdx){
  if(movingIdx === null) return bits.slice();
  const newBits = bits.slice();
  newBits[movingIdx] = newBits[movingIdx] === 1 ? 0 : 1;
  return newBits;
}

// 호괘 생성: 2,3,4효 → 하괘 / 3,4,5효 → 상괘
// 배열 인덱스로는: [4,3,2] → 하괘(위→아래) / [3,2,1] → 상괘(위→아래)
// 주의: 호괘는 효를 뽑아 새로 3효씩 묶으므로, 순서를 명확히 해야 함.
//   상효(6), 5효, 4효, 3효, 2효, 초효(1) = 인덱스 0,1,2,3,4,5
//   2,3,4효 = 인덱스 4,3,2 (하→상 방향이 아닌, 효 번호로는 2→3→4)
//   이걸 새로운 괘의 하괘(상→하: 4,3,2)로 해석
//   상괘는 3,4,5효 = 인덱스 3,2,1 → 상→하: 5,4,3 = 인덱스 1,2,3
function buildMutualHexagram(bits){
  // 상괘 = 5효, 4효, 3효 (상에서 하로) = 인덱스 1, 2, 3
  const outerBits = [bits[1], bits[2], bits[3]];
  // 하괘 = 4효, 3효, 2효 (상에서 하로) = 인덱스 2, 3, 4
  const innerBits = [bits[2], bits[3], bits[4]];
  return [...outerBits, ...innerBits];
}

        도형이 크고 넓을수록 해당 기질이 뚜렷하며, 두 색상이 비슷한 모양일수록 서로 닮았고,
        한쪽만 튀어나온 지점은 '내가 강한 영역을 상대는 약하게 가진' 구조입니다.
        <strong style="color:var(--sage);">녹색 공명대</strong>는 두 사람이 함께 확장되는 영역,
        <strong style="color:var(--crimson);">붉은 충돌대</strong>는 조율이 필요한 영역입니다.
      </div>

      <div class="chart-box">
        <div class="cap">
          <div class="cap-title">상괘 — 사회적 기질</div>
          <div class="cap-sub">세상에 비치는 기질의 분포</div>
        </div>
        <div class="chart-wrap"><canvas id="radarOuter"></canvas></div>

        <!-- 공명/충돌 표시 -->
        ${resonanceClashStrip(resonance, clash, sameOuter, meName, youName)}
      </div>

      <div class="chart-box">
        <div class="cap">
          <div class="cap-title">하괘 — 내면의 기질</div>
          <div class="cap-sub">내면에서 작동하는 기질의 분포</div>
        </div>
        <div class="chart-wrap"><canvas id="radarInner"></canvas></div>

        <!-- 공명/충돌 표시 (하괘) -->
        ${resonanceClashStrip(resonanceInner, clashInner, sameInner, meName, youName)}
      </div>

      <div class="chart-box">
        <div class="cap">
          <div class="cap-title">음양 균형</div>
          <div class="cap-sub">양(陽) vs 음(陰) 비율 대조 (상괘 기준)</div>
        </div>
        <div style="font-family:var(--font-serif);font-size:.88rem;color:var(--text);line-height:1.8;margin-bottom:16px;padding:12px 16px;background:rgba(0,45,98,.03);border-radius:8px;word-break:keep-all;">
          <strong>양(陽)</strong>은 바깥으로 뻗어나가는 능동적 에너지(${guaLabel('건')} · ${guaLabel('진')} · ${guaLabel('감')} · ${guaLabel('간')})를,
          <strong>음(陰)</strong>은 안으로 품어 기르는 수용적 에너지(${guaLabel('태')} · ${guaLabel('리')} · ${guaLabel('손')} · ${guaLabel('곤')})를 뜻합니다.
          한 사람이 양에 치우치고 상대가 음에 치우치면 <strong>서로를 채워주는 보완</strong>이 되고,
          같은 극에 치우치면 <strong>공명은 크되 편중의 위험</strong>이 따릅니다.
        </div>
        ${yyBar(meName, yangMe)}
        ${yyBar(youName, yangYou)}
        ${yinYangVerdict(yangMe, yangYou)}
      </div>
    </div>

    <!-- II. 오행 -->
    <div class="section">
      <div class="section-head">
        <span class="section-num">II.</span>
        <h2 class="section-title">두 사람의 오행 조화도</h2>
      </div>
      <p class="section-sub">상괘·하괘가 합쳐져 드러나는 전체 에너지의 만남</p>

      <!-- 오행 섹션 설명 -->
      <div style="font-family:var(--font-serif);font-size:.9rem;color:var(--text);line-height:1.85;background:rgba(184,146,74,.05);padding:18px 22px;border-radius:10px;margin-bottom:22px;word-break:keep-all;">
        <strong>오행(五行)</strong>은 만물을 이루는 다섯 가지 근원적 기운 — 木(나무)·火(불)·土(흙)·金(쇠)·水(물) — 입니다.
        상괘와 하괘의 조화로움은 결국 오행 분포로 치환될 수 있으며, 이는 그 사람의 <strong>에너지 지문</strong>이 됩니다.
        두 사람의 오행 지문이 어떻게 맞물리고 흘러가는지 알 수 있습니다.
      </div>

      <!-- 개인 오행 분포 (나 vs 상대) -->
      <div style="background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px;">
        <div style="font-family:var(--font-display);font-weight:800;color:var(--navy);font-size:1.05rem;margin-bottom:4px;">
          🎯 각자의 오행 분포
        </div>
        <div style="font-family:var(--font-serif);font-size:.82rem;color:var(--muted);margin-bottom:18px;">
          상괘와 하괘를 통합한 전체 에너지 지문
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;" class="wuxing-pentagon-grid">
          <div>
            ${personalWuxingPentagon(wuMe, meName, '#002D62')}
            <div style="margin-top:10px;padding:10px 14px;background:rgba(0,45,98,.04);border-radius:8px;font-family:var(--font-serif);font-size:.85rem;color:var(--text);line-height:1.7;text-align:center;word-break:keep-all;">
              ${wuxingCharacterPhrase(wuMe)}
            </div>
          </div>
          <div>
            ${personalWuxingPentagon(wuYou, youName, '#8B2E3E')}
            <div style="margin-top:10px;padding:10px 14px;background:rgba(139,46,62,.04);border-radius:8px;font-family:var(--font-serif);font-size:.85rem;color:var(--text);line-height:1.7;text-align:center;word-break:keep-all;">
              ${wuxingCharacterPhrase(wuYou)}
            </div>
          </div>
        </div>
      </div>

      <!-- 통합 분석 -->
      ${wuxingIntegratedBox(wuMe, wuYou, meName, youName, wuBalance, wuFlow, wuTotalScore)}
    </div>

    <!-- II-b. 64괘 에너지 휠 -->
    <div class="section">
      <div class="section-head">
        <span class="section-num">◎</span>
        <h2 class="section-title">64괘 에너지 휠</h2>
      </div>
      <p class="section-sub">서로가 서로의 에너지 지도에서 어디에 자리하는가</p>

      <!-- 섹션 설명 -->
      <div style="font-family:var(--font-serif);font-size:.9rem;color:var(--text);line-height:1.85;background:rgba(107,142,90,.05);padding:18px 22px;border-radius:10px;margin-bottom:24px;word-break:keep-all;">
        각자의 괘를 중심에 두고 <strong>64괘 전체를 궁합 점수 순으로 펼친 지도</strong>입니다.
        파랑에 가까울수록 최상의 조화, 빨강에 가까울수록 긴장이 높은 영역입니다.
        <strong>별표로 표시된 자리</strong>가 상대의 괘 위치이며, 두 휠에서 서로의 위치를 보면 관계의 상호 거리감이 드러납니다.
        <br><br>
        <span style="font-size:.82rem;color:var(--muted);">💡 휠 조각에 마우스를 올리면 각 괘와의 궁합 정보를 볼 수 있습니다.</span>
      </div>

      <!-- 두 개의 휠 (나 중심 / 상대 중심) -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:20px;" class="wheel-grid">
        <div>${compatibilityWheelBox(meOuter, meInner, youOuter, youInner, meName, youName, 'navy', 'wheel-me', buildWheelCandidates(meOuterPct, meInnerPct))}</div>
        <div>${compatibilityWheelBox(youOuter, youInner, meOuter, meInner, youName, meName, 'sky', 'wheel-you', buildWheelCandidates(youOuterPct, youInnerPct))}</div>
      </div>

      <!-- 범례 -->
      <div style="display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:14px;margin-top:16px;padding:14px 18px;background:#fafaf7;border-radius:10px;font-size:.75rem;color:var(--muted);font-family:var(--font-display);">
        <span style="display:inline-flex;align-items:center;gap:4px;">
          <span style="width:12px;height:12px;background:#3498DB;border-radius:2px;display:inline-block;"></span> 최상
        </span>
        <span style="display:inline-flex;align-items:center;gap:4px;">
          <span style="width:12px;height:12px;background:#2ECC71;border-radius:2px;display:inline-block;"></span> 안정
        </span>
        <span style="display:inline-flex;align-items:center;gap:4px;">
          <span style="width:12px;height:12px;background:#F1C40F;border-radius:2px;display:inline-block;"></span> 평범
        </span>
        <span style="display:inline-flex;align-items:center;gap:4px;">
          <span style="width:12px;height:12px;background:#E67E22;border-radius:2px;display:inline-block;"></span> 서먹
        </span>
        <span style="display:inline-flex;align-items:center;gap:4px;">
          <span style="width:12px;height:12px;background:#E74C3C;border-radius:2px;display:inline-block;"></span> 충돌
        </span>
      </div>
    </div>

    <!-- III. 사회적 페르소나 -->
    <div class="section">
      <div class="section-head">
        <span class="section-num">III.</span>
        <h2 class="section-title">사회적 페르소나</h2>
      </div>
      <p class="section-sub">세상에 비치는 두 사람의 모습 · 상괘 ${guaLabel(meOuter)} × ${guaLabel(youOuter)}의 만남</p>

      <!-- 상호 시선 패널 (상괘) -->
      ${perspectivePanel(meName, meOuter, youName, youOuter, 'outer')}

      <!-- 구체 분석 -->
      <div style="border-top:1px dashed var(--line);padding-top:28px;margin-top:10px;">

        <div class="criteria-grid">
          ${criterionCard('ROLE', '관계 내 역할', personaData.criteria.role)}
          ${criterionCard('DYNAMIC', '상호 역동', personaData.criteria.dynamic_trait)}
          ${criterionCard('CONTROL', '통제 방식', personaData.criteria.control)}
          ${criterionCard('ELEMENTAL', '오행적 기반', personaData.criteria.elemental)}
        </div>
      </div>
    </div>

    <!-- IV. 심층 정서 -->
    <div class="section">
      <div class="section-head">
        <span class="section-num">IV.</span>
        <h2 class="section-title">심층 정서와 본능</h2>
      </div>
      <p class="section-sub">둘만 있을 때 흐르는 무의식의 기류 · 하괘 ${guaLabel(meInner)} × ${guaLabel(youInner)}의 만남</p>

      <!-- 상호 심증 패널 (하괘) -->
      ${perspectivePanel(meName, meInner, youName, youInner, 'inner')}

      <!-- 구체 분석 -->
      <div style="border-top:1px dashed var(--line);padding-top:28px;margin-top:10px;">
        <div style="font-family:var(--font-display);color:var(--blue-soft);font-weight:700;font-size:1rem;margin-bottom:14px;letter-spacing:1px;">
          ◆ 내면 역학 분석
        </div>
        ${summaryBox(innateData.summary, 'var(--blue-soft)', 'rgba(74,144,226,.05)')}

        <div class="criteria-grid">
          ${criterionCard('ATTACHMENT', '애착 유형', innateData.criteria.attachment, true)}
          ${criterionCard('PROXIMITY', '인력의 거리', innateData.criteria.proximity, true)}
          ${criterionCard('DRAIN', '에너지 연소율', innateData.criteria.drain, true)}
          ${criterionCard('COMPENSATION', '결핍 보완', innateData.criteria.compensation, true)}
        </div>

        <div class="drain-gauge">

          <div style="font-size:.88rem;color:var(--muted);">함께 있을 때 두 사람은 충전되는가, 방전되는가</div>
          <div class="drain-bar">
            <div class="drain-marker" style="left:${drainPosition(wuInner, disc)}%"></div>
          </div>
          <div class="drain-labels">
            <span>극심한 방전</span>
            <span>평형</span>
            <span>충만한 충전</span>
          </div>
        </div>
      </div>
    </div>

    <!-- V. OMST의 제안 -->
    <div class="section">
      <div class="section-head">
        <span class="section-num">V.</span>
        <h2 class="section-title">OMST의 제안 · 관계 가이드</h2>
      </div>
      <p class="section-sub">두 사람의 에너지 진단을 바탕으로 한 실천 지침</p>

      <!-- 섹션 개요 -->
      <div style="font-family:var(--font-serif);font-size:.9rem;color:var(--text);line-height:1.85;background:rgba(0,45,98,.04);padding:18px 22px;border-radius:10px;margin-bottom:24px;word-break:keep-all;">
        지금까지의 분석 — <strong>친화도, 오행, 공명/충돌, 서로의 시선</strong> — 을 바탕으로,

        "좋다/나쁘다"의 판단이 아닌, <strong>두 사람의 고유한 조합에서 빛나는 지점과 조심할 지점</strong>에 대한 방향 제시입니다.

      <!-- 1. 핵심 자산 (강점) -->

            우리 관계의 핵심 자산
          </div>
          <span style="font-size:.75rem;color:var(--muted);font-family:var(--font-display);letter-spacing:1px;">STRENGTHS</span>
        </div>
        <div style="font-family:var(--font-serif);font-size:.9rem;color:var(--text);line-height:1.9;word-break:keep-all;">
          ${generateStrengths(affinity, wuBalance, wuFlow, resonance, resonanceInner, meName, youName, meOuter, youOuter, meInner, youInner)}
        </div>
      </div>

      <!-- 2. 주의해야 할 지점 -->
      <div style="background:linear-gradient(135deg, rgba(184,146,74,.07) 0%, rgba(184,146,74,.02) 100%);border:1px solid rgba(184,146,74,.25);border-radius:14px;padding:24px 26px;margin-bottom:14px;">

          ${generateWatchouts(affinity, clash, clashInner, meName, youName)}
        </div>
      </div>

      <!-- 3. 대화의 기술 -->
      <div style="background:#fff;border:1px solid var(--line);border-radius:14px;padding:24px 26px;margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
          <span style="font-size:1.3rem;">💬</span>
          <div style="font-family:var(--font-display);font-weight:800;color:var(--navy);font-size:1.05rem;">

          </div>

        </div>
        <div style="font-family:var(--font-serif);font-size:.9rem;color:var(--text);line-height:1.9;word-break:keep-all;">
          ${generateCommunicationTips(meOuter, youOuter, meInner, youInner, meName, youName)}
        </div>
      </div>

      <!-- 4. 함께 성장하기 위한 실천 -->
      <div style="background:#fff;border:1px solid var(--line);border-radius:14px;padding:24px 26px;margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
          <span style="font-size:1.3rem;">🛠</span>
          <div style="font-family:var(--font-display);font-weight:800;color:var(--navy);font-size:1.05rem;">
            함께 성장하기 위한 실천
          </div>
          <span style="font-size:.75rem;color:var(--muted);font-family:var(--font-display);letter-spacing:1px;">GROWTH ACTIONS</span>
        </div>
        <div style="font-family:var(--font-serif);font-size:.9rem;color:var(--text);line-height:1.9;word-break:keep-all;">
          ${generateGrowthActions(personaData, innateData, meName, youName)}
        </div>
      </div>

      <!-- 5. 금기 (Deal Breakers) -->
      <div style="background:linear-gradient(135deg, rgba(166,61,64,.05) 0%, rgba(166,61,64,.02) 100%);border:1px solid rgba(166,61,64,.25);border-radius:14px;padding:24px 26px;margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
          <span style="font-size:1.3rem;">🚫</span>
          <div style="font-family:var(--font-display);font-weight:800;color:var(--crimson);font-size:1.05rem;">
            절대 하지 말아야 할 것
          </div>
          <span style="font-size:.75rem;color:var(--muted);font-family:var(--font-display);letter-spacing:1px;">DEAL BREAKERS</span>
        </div>
        <div style="font-family:var(--font-serif);font-size:.9rem;color:var(--text);line-height:1.9;word-break:keep-all;">
          <div style="margin-bottom:14px;padding:12px 14px;background:rgba(166,61,64,.04);border-left:3px solid var(--crimson);border-radius:6px;">
            <strong style="color:var(--crimson);font-family:var(--font-display);">사회적 관계에서</strong><br>
            ${personaData.taboo && personaData.taboo.trim() ? personaData.taboo : `
              <div style="color:#c44;font-size:.85rem;padding:8px 0;">
                ⚠ <strong>${meOuter}_${youOuter}</strong> 조합의 taboo 로드 실패<br>
                <div style="background:#fff8f8;padding:8px;margin-top:6px;border-radius:4px;font-family:monospace;font-size:.75rem;color:#333;">
                  → DB11_Atomic 전체 키 개수: <strong>${(window.DB11_Atomic && Object.keys(window.DB11_Atomic).length) || 0}</strong>개<br>
                  → ${meOuter}_${youOuter} 키 존재: <strong>${!!(window.DB11_Atomic && window.DB11_Atomic[meOuter+'_'+youOuter])}</strong><br>
                  → persona 존재: <strong>${!!(window.DB11_Atomic && window.DB11_Atomic[meOuter+'_'+youOuter]?.persona)}</strong><br>
                  → persona.taboo 존재: <strong>${!!(window.DB11_Atomic && window.DB11_Atomic[meOuter+'_'+youOuter]?.persona?.taboo)}</strong><br>
                  → persona.taboo 길이: <strong>${(window.DB11_Atomic && window.DB11_Atomic[meOuter+'_'+youOuter]?.persona?.taboo?.length) || 0}</strong>
                </div>
              </div>`}
          </div>
          <div style="padding:12px 14px;background:rgba(166,61,64,.04);border-left:3px solid var(--crimson);border-radius:6px;">
            <strong style="color:var(--crimson);font-family:var(--font-display);">친밀한 관계에서</strong><br>
            ${innateData.taboo && innateData.taboo.trim() ? innateData.taboo : `
              <div style="color:#c44;font-size:.85rem;padding:8px 0;">
                ⚠ <strong>${meInner}_${youInner}</strong> 조합의 taboo 로드 실패<br>

// 박스 우측에 배경 패턴처럼 들어갈 6효 괘 그림
function hexagramPatternSVG(outer, inner, lineColor='rgba(255,255,255,.18)'){
  const outerBits = TRIGRAM[outer].binary.split('').map(Number);
  const innerBits = TRIGRAM[inner].binary.split('').map(Number);
  const bits = [...outerBits, ...innerBits];

  const lineWidth = 100;
  const yaoHeight = 13;
  const gap = 7;
  const cx = 60;
  const totalH = (yaoHeight + gap) * 6;

  let yaos = '';
  for(let i=0; i<6; i++){
    const y = i * (yaoHeight + gap);
    const isYang = bits[i] === 1;
    if(isYang){
      yaos += `<rect x="${cx - lineWidth/2}" y="${y}" width="${lineWidth}" height="${yaoHeight}" fill="${lineColor}" rx="1.5"/>`;
    } else {
      const seg = (lineWidth - 14) / 2;
      yaos += `<rect x="${cx - lineWidth/2}" y="${y}" width="${seg}" height="${yaoHeight}" fill="${lineColor}" rx="1.5"/>`;
      yaos += `<rect x="${cx + 7}" y="${y}" width="${seg}" height="${yaoHeight}" fill="${lineColor}" rx="1.5"/>`;
    }
  }
  return `
    <svg viewBox="0 0 120 ${totalH}" style="display:block;height:100%;width:auto;" xmlns="http://www.w3.org/2000/svg">
      ${yaos}
    </svg>`;
}

// ─── 잠재괘 카드 섹션 (ver1 스타일) ───
// 상괘/하괘의 1등과 2등 차이가 5% 미만이면 잠재적 조합 괘를 보여줌
// 조합:
//   - 내면의 변수: [fO + secondI]  (하괘가 박빙일 때)
//   - 외부적 환경: [secondO + fI]  (상괘가 박빙일 때)
//   - 잠재적 역동: [secondO + secondI]  (둘 다 박빙일 때)
function potentialHexCards(outerPcts, innerPcts, theme='navy'){
  // 1,2위 찾기
  const sortedO = Object.entries(outerPcts).sort((a,b) => b[1] - a[1]);
  const sortedI = Object.entries(innerPcts).sort((a,b) => b[1] - a[1]);
  const fO = sortedO[0][0], secondO = sortedO[1][0];
  const fI = sortedI[0][0], secondI = sortedI[1][0];
  const gapO = sortedO[0][1] - sortedO[1][1];
  const gapI = sortedI[0][1] - sortedI[1][1];

  const THRESHOLD = 5.0;
  const isOComplex = gapO < THRESHOLD;
  const isIComplex = gapI < THRESHOLD;

  // 경합이 없으면 카드 없음
  if(!isOComplex && !isIComplex) return '';

  // 현재 메인괘 binary (제외하기 위함)
  const mainBinary = TRIGRAM[fO].binary + TRIGRAM[fI].binary;

  const hexes = [];
  const addHex = (top, bottom, label) => {
    const binary = TRIGRAM[top].binary + TRIGRAM[bottom].binary;
    if(binary === mainBinary) return;  // 메인과 같으면 스킵
    const iching = (window.ichingDB || {})[binary];
    if(!iching) return;
    hexes.push({
      symbol: iching.symbol,
      name: iching.name,
      label: label,
    });
  };

  if(isIComplex) addHex(fO, secondI, '내면의 변수');
  if(isOComplex) addHex(secondO, fI, '외부적 환경');
  if(isOComplex && isIComplex) addHex(secondO, secondI, '잠재적 역동');

  if(hexes.length === 0) return '';

  // 테마별 색상 (메인 박스와 맞춤)
  const colors = theme === 'sky'
    ? { accent: '#8B2E3E', border: 'rgba(139,46,62,.15)' }
    : { accent: '#002D62', border: 'rgba(0,45,98,.1)' };

  return `
    <div style="margin:-8px 0 22px 0;">
      <p style="text-align:center;font-size:.78rem;color:#999;margin-bottom:12px;letter-spacing:2px;font-family:var(--font-serif);">
        ── 상황에 따라 발현되는 잠재적 기질 ──
      </p>
      <div style="display:grid;grid-template-columns:repeat(${hexes.length},1fr);gap:10px;">
        ${hexes.map(hex => `
          <div style="background:#fff;border:1px solid ${colors.border};padding:16px 8px;border-radius:14px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.02);">
            <div style="font-size:1.7rem;color:${colors.accent};margin-bottom:5px;line-height:1;font-family:serif;">${hex.symbol}</div>
            <div style="font-size:.85rem;font-weight:bold;color:#444;font-family:var(--font-display);">${hex.name.split('(')[0].trim()}</div>
            <div style="font-size:.66rem;color:#aaa;margin-top:4px;white-space:nowrap;letter-spacing:.5px;">${hex.label}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

// 음양 보완/과잉 판정
function yinYangVerdict(yangA, yangB){
  // 한 사람이 양 쪽, 다른 사람이 음 쪽 → 보완
  // 둘 다 같은 쪽으로 치우침 → 과잉
  const diffFromCenter_A = yangA - 50;
  const diffFromCenter_B = yangB - 50;
  const sameDirection = (diffFromCenter_A * diffFromCenter_B) > 0;
  const magnitude = Math.abs(yangA - yangB);

  let verdict, desc, color, bgColor;
  if(!sameDirection && magnitude > 15){
    verdict = '서로를 채워주는 보완';
    desc = '한 사람은 밖으로 뻗어나가는 기운, 다른 사람은 안으로 품어주는 기운이 강해 서로의 빈 자리를 자연스럽게 메워주는 조합입니다.';
    color = 'var(--sage)';
    bgColor = 'rgba(107,142,90,.07)';
  } else if(sameDirection && Math.abs(diffFromCenter_A) > 20 && Math.abs(diffFromCenter_B) > 20){
    verdict = '같은 쪽으로의 쏠림';
    desc = '두 사람 모두 비슷한 방향으로 강하게 기울어 있어, 같은 편에 설 땐 응집력이 크지만 외부 자극에 함께 흔들릴 위험도 있습니다.';
    color = 'var(--crimson)';
    bgColor = 'rgba(166,61,64,.06)';
  } else if(magnitude < 10){
    verdict = '잔잔한 평형';
    desc = '두 사람의 기운이 비슷한 농도로 흘러 큰 부딪힘도 큰 파동도 없이 편안하게 이어지는 관계입니다.';
    color = 'var(--gold)';
    bgColor = 'rgba(184,146,74,.07)';
  } else {
    verdict = '미세한 조율이 필요한 사이';
    desc = '크게 다르지도, 똑같지도 않은 미묘한 차이가 있어 서로를 섬세하게 이해할수록 관계가 깊어지는 조합입니다.';
    color = 'var(--muted)';
    bgColor = 'rgba(0,0,0,.03)';
  }

  return `
    <div style="margin-top:10px;padding:14px 18px;background:${bgColor};border-radius:10px;border-left:3px solid ${color};">
      <div style="font-family:var(--font-display);font-weight:700;color:${color};font-size:.95rem;margin-bottom:4px;">
        ${verdict}
      </div>
      <div style="font-family:var(--font-serif);font-size:.85rem;color:var(--text);line-height:1.6;">
        ${desc}
      </div>
    </div>`;
}

// 오행 5각형 SVG (기존과 동일)
// ─── 개인 오행 분포 5각도 차트 (퍼센트 기반 영역) ───
// wuDist: {木: %, 火: %, 土: %, 金: %, 水: %}, name: 표시명, accent: 색상
function personalWuxingPentagon(wuDist, name, accent){
  const w = 280, h = 280, cx = w/2, cy = h/2, rMax = 95;
  const elements = ['木','火','土','金','水'];
  const elColor = {'木':'#6B8E5A','火':'#A63D40','土':'#B8924A','金':'#8B7355','水':'#4A90E2'};

  // 비율 합 (보통 100이지만 안전차)
  const total = elements.reduce((s,e) => s + (wuDist[e]||0), 0) || 1;

  // 각 오행의 좌표 (최대값 기준 위치)
  const axisPoints = elements.map((el, i) => {
    const angle = (i * 72 - 90) * Math.PI / 180;
    return {
      el,
      x: cx + rMax*Math.cos(angle), y: cy + rMax*Math.sin(angle),
      xLabel: cx + (rMax+22)*Math.cos(angle), yLabel: cy + (rMax+22)*Math.sin(angle),
      angle,
    };
  });

  // 실제 데이터 영역 (비율 100%가 최대 = rMax 도달)
  // 현실적으로 한 오행이 60% 넘기 힘드므로 스케일은 50% 기준으로 시각화
  const maxScale = 50;
  const dataPoints = elements.map((el, i) => {
    const pct = (wuDist[el]/total)*100;
    const ratio = Math.min(pct / maxScale, 1);  // 50%에서 축 끝에 닿음
    const r = rMax * ratio;
    const angle = (i * 72 - 90) * Math.PI / 180;
    return { x: cx + r*Math.cos(angle), y: cy + r*Math.sin(angle), pct };
  });

  // 그리드 (25%, 50% 기준 오각형)
  let grids = '';
  [0.5, 1.0].forEach((lvl, idx) => {
    const pts = axisPoints.map(p => {
      const x = cx + (p.x - cx) * lvl;
      const y = cy + (p.y - cy) * lvl;
      return `${x},${y}`;
    }).join(' ');
    grids += `<polygon points="${pts}" fill="none" stroke="#E8E2D5" stroke-width="${idx===1?1:.8}" stroke-dasharray="${idx===1?'':'3 3'}"/>`;
  });
  // 축선
  let axes = '';
  axisPoints.forEach(p => {
    axes += `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="#E8E2D5" stroke-width=".8"/>`;
  });

  // 데이터 영역
  const dataPath = dataPoints.map(p => `${p.x},${p.y}`).join(' ');
  // 노드 + 라벨
  let nodes = '';
  axisPoints.forEach((p, i) => {
    const el = p.el;
    const pct = dataPoints[i].pct;
    // 라벨 (오행 + 퍼센트)
    nodes += `
      <circle cx="${p.x}" cy="${p.y}" r="14" fill="#fff" stroke="${elColor[el]}" stroke-width="2"/>
      <text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="middle"
            font-family="serif" font-size="13" font-weight="bold" fill="${elColor[el]}">${el}</text>
      <text x="${p.xLabel}" y="${p.yLabel}" text-anchor="middle" dominant-baseline="middle"
            font-family="Pretendard,sans-serif" font-size="10.5" fill="var(--muted)" font-weight="600">${pct.toFixed(0)}%</text>
      <circle cx="${dataPoints[i].x}" cy="${dataPoints[i].y}" r="4" fill="${accent}" stroke="#fff" stroke-width="2"/>
    `;
  });

  return `
    <div style="text-align:center;">
      <div style="font-family:var(--font-display);font-weight:700;color:${accent};font-size:1rem;margin-bottom:6px;">
        ${name}의 오행 분포
      </div>
      <svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:280px;height:auto;" xmlns="http://www.w3.org/2000/svg">
        ${grids}
        ${axes}
        <polygon points="${dataPath}" fill="${accent}" fill-opacity=".18" stroke="${accent}" stroke-width="2" stroke-linejoin="round"/>
        ${nodes}
      </svg>
    </div>`;
}

// ─── 오행 분포 특징 한 줄 문구 생성 ───
// wuDist 에서 상위 2개 오행 뽑아 기질 설명
function wuxingCharacterPhrase(wuDist){
  const elements = ['木','火','土','金','水'];
  // wuDist 합을 100% 기준으로 정규화 (안전하게)
  const total = elements.reduce((s,e) => s + (wuDist[e]||0), 0) || 1;
  const normalized = {};
  elements.forEach(e => { normalized[e] = ((wuDist[e]||0) / total) * 100; });

  const sorted = elements.map(e => ({e, pct: normalized[e]})).sort((a,b) => b.pct - a.pct);
  const top1 = sorted[0], top2 = sorted[1];

  const charMap = {
    '木': '성장과 추진',
    '火': '표현과 정열',
    '土': '수용과 안정',
    '金': '결단과 원칙',
    '水': '사색과 응축',
  };

  // 기준값: 균등 분포 = 20%
  const deviation1 = top1.pct - 20;  // top1이 균등 대비 얼마나 높은가
  const deviation2 = top2.pct - 20;

  // ① 압도적 편중: 1등이 35% 이상 (균등 대비 +15%p)
  if(top1.pct >= 35){
    return `<strong>${top1.e}(${charMap[top1.e]})</strong>의 기운이 뚜렷하게 지배하는 결`;
  }
  // ② 이중 축: 1·2등이 둘 다 25% 이상이고 격차 10% 미만
  if(top1.pct >= 25 && top2.pct >= 25 && (top1.pct - top2.pct) < 8){
    return `<strong>${top1.e}(${charMap[top1.e]})</strong>와 <strong>${top2.e}(${charMap[top2.e]})</strong>의 이중 축으로 움직이는 결`;
  }
  // ③ 뚜렷한 한 축 우세: 1등이 27% 이상 (균등 대비 +7%p)
  if(top1.pct >= 27){
    return `<strong>${top1.e}(${charMap[top1.e]})</strong>의 기운이 우세하게 흐르는 결`;
  }
  // ④ 정말 고른 분포: 표준편차 < 5 AND 1등 25% 미만
  const std = Math.sqrt(elements.reduce((s,e) => s + Math.pow(normalized[e] - 20, 2), 0) / 5);
  if(std < 5 && top1.pct < 25){
    return `다섯 오행이 <strong>고르게 순환</strong>하는 유연한 결`;
  }
  // ⑤ 그 외: top1 축이 있되 전반이 섞인 분포
  return `<strong>${top1.e}(${charMap[top1.e]})</strong>를 중심으로 여러 기운이 섞인 결`;
}

// ─── 상생/상극 포인트 추출 ───
// 두 사람의 오행 분포에서 상호작용이 큰 조합(비율 곱 상위) 뽑기
function extractKeyFlows(wuA, wuB, topN = 3){
  const elements = ['木','火','土','金','水'];
  // 정규화
  const sumA = elements.reduce((s,e) => s + wuA[e], 0) || 1;
  const sumB = elements.reduce((s,e) => s + wuB[e], 0) || 1;
  const flows = [];
  elements.forEach(a => {
    elements.forEach(b => {
      const pA = wuA[a]/sumA, pB = wuB[b]/sumB;
      const weight = pA * pB;
      if(weight < 0.02) return;  // 비율 너무 작으면 스킵
      const score = wuxingRelationScore(a, b);
      let type = '중립';
      if(a === b) type = '비화';
      else if(WUXING_SHENG[a] === b) type = '상생';
      else if(WUXING_SHENG[b] === a) type = '피생';
      else if(WUXING_KE[a] === b) type = '상극';
      else if(WUXING_KE[b] === a) type = '피극';
      flows.push({a, b, weight, score, type});
    });
  });
  flows.sort((x, y) => y.weight - x.weight);
  return flows.slice(0, topN);
}

function wuxingSVG(a, b, title){
  const w = 360, h = 340, cx = w/2, cy = h/2, r = 105;
  const elements = ['木','火','土','金','水'];
  const points = elements.map((el, i) => {
    const angle = (i * 72 - 90) * Math.PI / 180;
    return {el, x: cx + r*Math.cos(angle), y: cy + r*Math.sin(angle)};
  });
  const elColor = {'木':'#6B8E5A','火':'#A63D40','土':'#B8924A','金':'#8B7355','水':'#4A90E2'};

  const wa = TRIGRAM[a].wuxing, wb = TRIGRAM[b].wuxing;

  let shengPaths = '';
  for(let i=0; i<5; i++){
    const p1 = points[i], p2 = points[(i+1)%5];
    shengPaths += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#D4D0C5" stroke-width="1.5" stroke-dasharray="4 3"/>`;
  }
  let keLines = '';
  for(let i=0; i<5; i++){
    const p1 = points[i], p2 = points[(i+2)%5];
    keLines += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#F0EAD6" stroke-width="1"/>`;
  }
  const aIdx = elements.indexOf(wa), bIdx = elements.indexOf(wb);
  let highlight = '';
  if(aIdx >= 0 && bIdx >= 0 && aIdx !== bIdx){
    const pa = points[aIdx], pb = points[bIdx];
    const diff = Math.abs(aIdx - bIdx);
    const isSheng = diff === 1 || diff === 4;
    const color = isSheng ? '#6B8E5A' : '#A63D40';
    highlight = `<line x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" stroke="${color}" stroke-width="3" stroke-linecap="round"/>`;
  }
  const nodes = points.map((p, i) => {
    const isA = elements[i] === wa;
    const isB = elements[i] === wb;
    const highlighted = isA || isB;
    const fill = highlighted ? elColor[elements[i]] : '#fff';
    const textFill = highlighted ? '#fff' : '#999';
    const stroke = highlighted ? elColor[elements[i]] : '#D4D0C5';
    const rr = highlighted ? 32 : 26;
    return `
      <circle cx="${p.x}" cy="${p.y}" r="${rr}" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
      <text x="${p.x}" y="${p.y+2}" text-anchor="middle" dominant-baseline="middle"
            font-family="serif" font-size="${highlighted?22:18}" font-weight="bold"
            fill="${textFill}">${elements[i]}</text>
      ${isA ? `<text x="${p.x}" y="${p.y+rr+16}" text-anchor="middle" font-size="11" font-family="Pretendard" fill="var(--navy)" font-weight="bold">A · ${a}</text>`:''}
      ${isB ? `<text x="${p.x}" y="${p.y+rr+(isA?30:16)}" text-anchor="middle" font-size="11" font-family="Pretendard" fill="var(--blue-soft)" font-weight="bold">B · ${b}</text>`:''}
    `;
  }).join('');

  return `
    <div style="font-family:var(--font-display);font-weight:700;color:var(--navy);margin-bottom:8px;font-size:1.05rem;">${title}</div>
    <svg class="wuxing-svg" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
      ${keLines}
      ${shengPaths}
      ${highlight}
      ${nodes}
      <text x="${cx}" y="24" text-anchor="middle" font-size="10" fill="#aaa" font-family="Pretendard" letter-spacing="2">— 상생(녹) · 상극(적) —</text>
    </svg>`;
}

// 6효 괘 SVG (주역 전통 다이어그램)
// bits: [상효, 5효, 4효, 3효, 2효, 초효]
function hexagramSVGBox(bits, title, outerName, innerName, movingIdx=null){
  const lineWidth = 100;
  const yaoHeight = 14;
  const gap = 8;
  const cx = 120;
  const totalH = (yaoHeight + gap) * 6 + 40;

  // 64괘명
  const hex64 = lookupHex64(outerName, innerName);

  let yaos = '';
  for(let i=0; i<6; i++){
    const y = 20 + i * (yaoHeight + gap);
    const isYang = bits[i] === 1;
    const isMoving = i === movingIdx;
    const fill = isMoving ? '#A63D40' : '#002D62';

    if(isYang){
      yaos += `<rect x="${cx - lineWidth/2}" y="${y}" width="${lineWidth}" height="${yaoHeight}" fill="${fill}" rx="2"/>`;
    } else {
      const seg = (lineWidth - 16) / 2;
      yaos += `<rect x="${cx - lineWidth/2}" y="${y}" width="${seg}" height="${yaoHeight}" fill="${fill}" rx="2"/>`;
      yaos += `<rect x="${cx + 8}" y="${y}" width="${seg}" height="${yaoHeight}" fill="${fill}" rx="2"/>`;
    }

    const yaoLabel = YAO_NAMES[i];
    const labelColor = isMoving ? '#A63D40' : '#888';
    const labelWeight = isMoving ? 'bold' : 'normal';
    yaos += `<text x="20" y="${y + yaoHeight/2 + 4}" font-size="10" fill="${labelColor}" font-weight="${labelWeight}" font-family="Pretendard">${yaoLabel}</text>`;

    if(isMoving){
      yaos += `<text x="${cx + lineWidth/2 + 12}" y="${y + yaoHeight/2 + 5}" font-size="16" fill="#A63D40" font-weight="bold">◉</text>`;
    }
  }

  const divY = 20 + 3 * (yaoHeight + gap) - gap/2;

  return `
    <div style="background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:24px;margin:16px 0;">
      <div style="font-family:var(--font-display);font-weight:700;color:var(--navy);font-size:1.05rem;margin-bottom:8px;text-align:center;">${title}</div>
      <div style="font-family:var(--font-serif);text-align:center;color:var(--muted);font-size:.88rem;margin-bottom:4px;">
        上 <strong style="color:var(--navy);">${outerName}${TRIGRAM[outerName].hanja}</strong> · 下 <strong style="color:var(--blue-soft);">${innerName}${TRIGRAM[innerName].hanja}</strong>
      </div>
      <!-- 64괘명 표기 -->
      <div style="text-align:center;margin-bottom:16px;">
        <span style="display:inline-block;padding:4px 14px;background:rgba(184,146,74,.1);border:1px solid rgba(184,146,74,.3);border-radius:20px;font-family:var(--font-display);font-size:.9rem;color:var(--gold);font-weight:700;">
          ${hex64.nature} ${hex64.name}<span style="color:var(--muted);font-weight:400;font-size:.78rem;">(${hex64.kor})</span>
        </span>
        <div style="font-family:var(--font-serif);font-size:.78rem;color:var(--muted);margin-top:6px;font-style:italic;">— ${hex64.meaning} —</div>
      </div>
      <svg viewBox="0 0 240 ${totalH}" style="display:block;margin:0 auto;max-width:280px;" xmlns="http://www.w3.org/2000/svg">
        <line x1="40" y1="${divY}" x2="200" y2="${divY}" stroke="#E8E2D5" stroke-width="1" stroke-dasharray="3 3"/>
        ${yaos}
      </svg>
    </div>`;
}

// 드레인 위치
function drainPosition(wuxing, disc){
  let base = 50;
  if(wuxing.type.includes('상생') || wuxing.type.includes('피생')) base = 75;
  else if(wuxing.type.includes('비화')) base = 60;
  else if(wuxing.type.includes('극')) base = 30;
  base -= (disc - 30) * 0.3;
  return Math.max(5, Math.min(95, base));
}

// 레이더 차트
function renderRadar(canvasId, mePcts, youPcts, meName, youName, accentColor){
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  if(window['_chart_' + canvasId]) window['_chart_' + canvasId].destroy();

  const labels = ORDER.map(t => TRIGRAM[t].hanja);
  const meData  = ORDER.map(t => mePcts[t]);
  const youData = ORDER.map(t => youPcts[t]);

  // 최댓값 기준 정규화 (값이 너무 뭉쳐 있으면 차이가 안 보이므로)
  const allMax = Math.max(...meData, ...youData);
  const scale = 100 / (allMax || 1);
  const meDataScaled = meData.map(v => v * scale);
  const youDataScaled = youData.map(v => v * scale);

  window['_chart_' + canvasId] = new Chart(ctx, {
    type:'radar',
    data:{
      labels,
      datasets:[
        {label:meName, data:meDataScaled, borderColor:accentColor, backgroundColor:hexToRgba(accentColor, 0.12), borderWidth:2.5, pointRadius:3, pointBackgroundColor:accentColor},
        {label:youName, data:youDataScaled, borderColor:'#8B2E3E', backgroundColor:'rgba(139,46,62,.12)', borderWidth:2.5, pointRadius:3, pointBackgroundColor:'#8B2E3E'}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{position:'bottom', labels:{font:{size:12, family:'Pretendard'}, padding:15}},
        tooltip:{callbacks:{
          label:(ctx) => {
            const orig = ctx.datasetIndex === 0 ? meData[ctx.dataIndex] : youData[ctx.dataIndex];
            return `${ctx.dataset.label}: ${orig.toFixed(1)}%`;
          }
        }}
      },
      scales:{
        r:{
          min:0, max:100,
          ticks:{display:false, stepSize:25},
          grid:{color:'rgba(0,0,0,.06)'},
          angleLines:{color:'rgba(0,0,0,.1)'},
          pointLabels:{font:{size:18, weight:'bold', family:'serif'}, color:'#333', padding:8}
        }
      }
    }
  });
}

function hexToRgba(hex, alpha){
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// 1. 핵심 자산 (강점) - 친화도·오행·공명 기반
function generateStrengths(affinity, wuBalance, wuFlow, resonance, resonanceInner, meName, youName, meOuter, youOuter, meInner, youInner){
  const items = [];

  // 친화도 전반
  if(affinity.total >= 75){
    items.push(`두 사람의 에너지 친화도가 <strong>${affinity.total.toFixed(0)}점</strong>으로 매우 높아, 서로의 존재 자체가 자연스러운 편안함을 주는 관계입니다. 억지로 맞추지 않아도 함께 있는 시간이 쉬워집니다.`);

// ─── 64괘 에너지 휠 (궁합 리포트 버전) ─────────────────────────
// 중앙 = 나의 괘, 주변 = 64괘 모두, 상대의 괘 위치를 하이라이트
// 색상은 나의 괘와 각 괘의 6효 일치도(궁합 점수)에 따라 그라데이션

// 6효 일치도 기반 궁합 점수 (0~100)
function compat64Score(myBinary, targetBinary){
  if(myBinary === targetBinary) return 100;
  let diff = 0;
  for(let i=0; i<6; i++){
    if(myBinary[i] !== targetBinary[i]) diff++;
  }
  return 100 - (diff * 10);  // 최대 6효 다름 = 40점, 같으면 100점
}

// 점수 → 색상 그라데이션 (ver1과 동일하지만 톤다운)
function wheelGradient(score){
  let v = (score - 40) * (100/60);
  if(v < 0) v = 0;
  if(v > 100) v = 100;
  if(v >= 80) return '#3498DB';  // 파랑 - 최상
  if(v >= 60) return '#2ECC71';  // 초록 - 안정
  if(v >= 40) return '#F1C40F';  // 노랑 - 평범
  if(v >= 20) return '#E67E22';  // 주황 - 서먹
  return '#E74C3C';              // 빨강 - 충돌
}

function wheelStatus(score){
  let v = (score - 40) * (100/60);
  if(v < 0) v = 0;
  if(v >= 80) return {label:'최상의 조화', color:'#3498DB', icon:'✨'};
  if(v >= 60) return {label:'안정적 관계', color:'#2ECC71', icon:'🌿'};
  if(v >= 40) return {label:'평범한 관계', color:'#F1C40F', icon:'⚖️'};
  if(v >= 20) return {label:'서먹한 관계', color:'#E67E22', icon:'⚠️'};
  return       {label:'충돌 주의',   color:'#E74C3C', icon:'🚨'};
}

// 한 사람의 경합괘 후보 리스트 생성 (본괘 + 잠재괘들)
// 휠 중심 전환용
function buildWheelCandidates(outerPcts, innerPcts){
  const sortedO = Object.entries(outerPcts).sort((a,b) => b[1] - a[1]);
  const sortedI = Object.entries(innerPcts).sort((a,b) => b[1] - a[1]);
  const fO = sortedO[0][0], secondO = sortedO[1][0];
  const fI = sortedI[0][0], secondI = sortedI[1][0];
  const gapO = sortedO[0][1] - sortedO[1][1];
  const gapI = sortedI[0][1] - sortedI[1][1];
  const THRESHOLD = 5.0;
  const isOComplex = gapO < THRESHOLD;
  const isIComplex = gapI < THRESHOLD;

  const mainBinary = TRIGRAM[fO].binary + TRIGRAM[fI].binary;
  const db = window.ichingDB || {};
  const mainData = db[mainBinary];

  const candidates = [];
  const addCandidate = (top, bottom, label) => {
    const binary = TRIGRAM[top].binary + TRIGRAM[bottom].binary;
    const data = db[binary];
    if(!data) return;
    // 중복 체크
    if(candidates.some(c => c.binary === binary)) return;
    candidates.push({
      binary,
      label,
      symbol: data.symbol,
      name: data.name.split(' (')[0].replace(/^\d+\.\s*/, ''),
    });
  };

  // 본괘 먼저
  if(mainData){
    candidates.push({
      binary: mainBinary,
      label: '본괘',
      symbol: mainData.symbol,
      name: mainData.name.split(' (')[0].replace(/^\d+\.\s*/, ''),
    });
  }
  // 잠재괘들
  if(isIComplex) addCandidate(fO, secondI, '내면 변수');
  if(isOComplex) addCandidate(secondO, fI, '외부 환경');
  if(isOComplex && isIComplex) addCandidate(secondO, secondI, '잠재 역동');

  return candidates;
}

// 두 사람의 휠 박스 HTML 생성 (중앙=나, 주변=64괘, 상대 괘 하이라이트)
// myCandidates: [{binary, label, symbol, name}] - 본괘 + 경합에서 나온 잠재괘들
function compatibilityWheelBox(myOuter, myInner, partnerOuter, partnerInner, myName, partnerName, theme, wheelId, myCandidates = []){

          1. <code>ichingDB.js</code> 파일이 같은 폴더에 있나요? (대소문자 정확히)<br>
          2. F12 → Network 탭에서 <code>ichingDB.js</code>가 200 OK인지 확인<br>
          3. F12 → Console 탭에 404 같은 에러가 있는지 확인
        </div>
      </div>`;
  }

  const myBinary = TRIGRAM[myOuter].binary + TRIGRAM[myInner].binary;
  const partnerBinary = TRIGRAM[partnerOuter].binary + TRIGRAM[partnerInner].binary;
  const myData = db[myBinary];
  const partnerData = db[partnerBinary];
  if(!myData || !partnerData){
    return `<div style="padding:20px;background:#fff8f8;border:1px solid #f88;border-radius:8px;color:#c44;">

  const candidates = myCandidates.length > 0 ? myCandidates : [{

    label: '본괘',
    symbol: myData.symbol,
    name: myData.name.split(' (')[0].replace(/^\d+\.\s*/, ''),
  }];

  const themeClass = theme === 'sky' ? 'sky' : '';
  const accent = theme === 'sky' ? '#8B2E3E' : '#002D62';

  // 버튼 HTML (경합괘가 1개 초과일 때만 표시)
  const buttonsHtml = candidates.length > 1 ? `
    <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;" id="${wheelId}-selector">
      ${candidates.map((c, i) => `
        <button class="wheel-candidate-btn ${i===0?'active':''}"
                data-wheel-id="${wheelId}"
                data-binary="${c.binary}"
                data-symbol="${c.symbol}"
                data-name="${c.name}"
                data-partner-binary="${partnerBinary}"
                data-partner-name="${partnerName}"
                data-accent="${accent}"
                onclick="switchWheelCore(this)"
                style="padding:5px 12px;border-radius:16px;border:1.5px solid ${accent};background:${i===0?accent:'#fff'};color:${i===0?'#fff':accent};font-size:.72rem;font-weight:700;cursor:pointer;font-family:var(--font-display);letter-spacing:.5px;transition:all .2s;">

        </button>
      `).join('')}
    </div>
  ` : '';

  // 초기 렌더 요청을 큐에 push (renderReport 끝에서 flush됨)

  return `
    <div style="text-align:center;">
      <div style="font-family:var(--font-display);font-weight:800;color:${accent};font-size:1.02rem;margin-bottom:4px;">

      </div>
      <div style="font-family:var(--font-serif);font-size:.8rem;color:var(--muted);margin-bottom:${candidates.length > 1 ? '10' : '16'}px;">
        중심은 ${myName}의 괘 · 별표는 ${partnerName}의 괘 위치
      </div>

      ${buttonsHtml}

      <div class="wheel-wrapper" id="${wheelId}-wrapper">
        <div class="wheel-pieces" id="${wheelId}-pieces"></div>
        <div class="wheel-center ${themeClass}" id="${wheelId}-center">
          <span class="title">MY CORE</span>
          <span class="symbol" id="${wheelId}-center-symbol"></span>
          <span class="name" id="${wheelId}-center-name"></span>
        </div>
      </div>

      <!-- 정보 박스 (hover 시 업데이트) -->
      <div id="${wheelId}-info" class="wheel-info-box"></div>
